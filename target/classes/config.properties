# ── Redis Source (Active) ──
source.host=YOUR_SOURCE_HOST
source.port=YOUR_SOURCE_PORT
source.password=YOUR_SOURCE_PASSWORD
source.ssl=true

# ── Redis Target (Passive) ──
target.host=YOUR_TARGET_HOST
target.port=YOUR_TARGET_PORT
target.password=YOUR_TARGET_PASSWORD
target.ssl=true

# ── Redis Cloud API ──
api.base.url=https://api.redislabs.com/v1
api.account.key=YOUR_ACCOUNT_KEY
api.secret.key=YOUR_SECRET_KEY
api.subscription.id=YOUR_SUBSCRIPTION_ID
api.source.db.id=YOUR_SOURCE_DB_ID
api.target.db.id=YOUR_TARGET_DB_ID

# ── Key Writer Settings ──
writer.interval.ms=500
writer.key.prefix=workspot:key:
